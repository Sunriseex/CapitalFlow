        account_id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        target_amount:
          type: string
          pattern: "^\\d+(\\.\\d{1,18})?$"
        target_date:
          type: string
          format: date
    UpdateFinancialGoalRequest:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        target_amount:
          type: string
          pattern: "^\\d+(\\.\\d{1,18})?$"
        target_date:
          type: string
          format: date
        status:
          type: string
          enum: [active, completed, archived]
    CategoryLimit:
      type: object
      required:
        [id, category_id, amount, currency, is_active, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        amount:
          type: string
          pattern: "^\\d+(\\.\\d{1,18})?$"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateCategoryLimitRequest:
      type: object
      required: [category_id, amount, currency]
      properties:
        category_id:
          type: string
          format: uuid
        amount:
          type: string
          pattern: "^\\d+(\\.\\d{1,18})?$"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        is_active:
          type: boolean
    UpdateCategoryLimitRequest:
      type: object
      properties:
        category_id:
          type: string
          format: uuid
        amount:
          type: string
          pattern: "^\\d+(\\.\\d{1,18})?$"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        is_active:
          type: boolean
    Transaction:
      type: object
      required:
        [
          id,
          account_id,
          source_type,
          source_metadata,
          type,
          status,
          amount,
          occurred_at,
          created_at,
        ]
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        related_account_id:
          type: string
          format: uuid
          nullable: true
        transfer_id:
          type: string
          format: uuid
          nullable: true
        source_type:
          $ref: "#/components/schemas/TransactionSource"
        source_ref_id:
          type: string
          format: uuid
          nullable: true
        source_metadata:
          type: object
          additionalProperties: true
        type:
          $ref: "#/components/schemas/TransactionType"
        status:
          $ref: "#/components/schemas/TransactionStatus"
        amount:
          type: string
          pattern: "^-?\\d+(\\.\\d{1,18})?$"
        category_id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
        occurred_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    ReverseTransactionResponse:
      type: object
