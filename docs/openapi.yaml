        name:
          type: string
          minLength: 1
          maxLength: 80
        slug:
          type: string
          minLength: 1
          maxLength: 80
          pattern: "^[a-z0-9]+(?:[-_][a-z0-9]+)*$"
    FinancialGoal:
      type: object
      required:
        [id, name, target_amount, currency, status, created_at, updated_at]
