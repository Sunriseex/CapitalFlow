    AccrueInterestResponse:
      type: object
      required: [skipped, transaction, accrual]
      properties:
        skipped:
          type: boolean
          enum: [false]
        transaction:
          $ref: "#/components/schemas/Transaction"
        accrual:
          $ref: "#/components/schemas/InterestAccrual"

    AccrueInterestSkippedResponse:
      type: object
      required: [skipped]
      properties:
        skipped:
          type: boolean
          enum: [true]

    InterestAccrual:
      type: object
      required:
        - id
        - account_id
        - rule_id
        - transaction_id
        - accrual_date
        - amount
        - balance
        - annual_rate_bps
        - created_at
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        rule_id:
          type: string
          format: uuid
        transaction_id:
          type: string
          format: uuid
        accrual_date:
          type: string
          format: date-time
        amount:
          type: string
          pattern: "^-?\\d+(\\.\\d{1,18})?$"
        balance:
          type: string
          pattern: "^-?\\d+(\\.\\d{1,18})?$"
        annual_rate_bps:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
