openapi: 3.0.3
info:
  title: CapitalFlow API
  version: v0.5.8
  license:
    name: MIT
    url: https://opensource.org/license/mit
servers:
  - url: http://localhost:8080/api/v1
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Authentication, sessions, passwords, and passkeys.
  - name: System
    description: Service health, readiness, and operational metrics.
  - name: Profile
    description: Current-user preferences.
  - name: Categories
    description: Transaction categories.
  - name: Goals
    description: Financial goals and monthly category limits.
  - name: Currencies
    description: Currency exchange rates.
  - name: Accounts
    description: Financial accounts and balances.
  - name: Transactions
    description: Ledger transactions and their lifecycle.
  - name: Transfers
    description: Transfers between accounts.
  - name: Interest Rules
    description: Interest rules, accrual, and recalculation.
  - name: Dashboard
    description: Aggregated financial reporting.
paths:
  /health:
    servers:
      - url: http://localhost:8080
    get:
      tags: [System]
      summary: Service health and version
      security: []
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceStatus"
        default:
          $ref: "#/components/responses/APIError"
  /ready:
    servers:
      - url: http://localhost:8080
    get:
      tags: [System]
      summary: Check service dependencies
      operationId: getReadiness
      security: []
      responses:
        "200":
          description: Service dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyStatus"
        "503":
          description: A required dependency is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /metrics:
    servers:
      - url: http://localhost:8080
    get:
      tags: [System]
      summary: Get allow-listed application metrics
      operationId: getMetrics
      security: []
      responses:
        "200":
          description: Application metrics
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /auth/status:
    servers:
      - url: http://localhost:8080
    get:
      tags: [Auth]
      summary: Check whether initial setup is required
      security: []
      responses:
        "200":
          description: Auth setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatusResponse"
        default:
          $ref: "#/components/responses/APIError"
  /auth/setup:
    servers:
      - url: http://localhost:8080
    post:
      tags: [Auth]
      summary: Create the first user and start a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthSetupRequest"
      responses:
        "201":
          description: Created session
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          $ref: "#/components/responses/APIError"
  /auth/login:
    servers:
      - url: http://localhost:8080
    post:
      tags: [Auth]
      summary: Start a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Started session
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          $ref: "#/components/responses/APIError"
  /auth/refresh:
    servers:
      - url: http://localhost:8080
    post:
      tags: [Auth]
      summary: Refresh access token using the HttpOnly refresh cookie
      security: []
      responses:
        "200":
          description: Refreshed session
          headers:
            Set-Cookie:
              description: Rotated HttpOnly refresh-token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          $ref: "#/components/responses/APIError"
  /auth/passkeys/login/options:
    servers:
      - url: http://localhost:8080
    post:
      tags: [Auth]
      summary: Start a passkey login ceremony
      security: []
      responses:
        "200":
          description: WebAuthn login options
          content:
            application/json:
              schema:
                type: object
        default:
          $ref: "#/components/responses/APIError"
  /auth/passkeys/login/verify:
    servers:
      - url: http://localhost:8080
    post:
      tags: [Auth]
      summary: Verify a passkey login response and start a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Started session
          headers:
            Set-Cookie:
              description: HttpOnly refresh-token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        default:
          $ref: "#/components/responses/APIError"
  /auth/logout:
    servers:
      - url: http://localhost:8080
    post:
      tags: [Auth]
      summary: Revoke the current refresh-token cookie session
      security: []
      responses:
        "204":
          description: Logged out
          headers:
            Set-Cookie:
              description: Expired refresh-token cookie.
              schema:
                type: string
        default:
          $ref: "#/components/responses/APIError"
  /settings/profile:
    get:
      tags: [Profile]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        default:
          $ref: "#/components/responses/APIError"
    patch:
      tags: [Profile]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        default:
          $ref: "#/components/responses/APIError"
  /auth/password:
    post:
      tags: [Auth]
      summary: Change current user password and revoke existing sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed
        default:
          $ref: "#/components/responses/APIError"
  /auth/sessions:
    get:
      tags: [Auth]
      summary: List current user sessions
      responses:
        "200":
          description: User sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionsResponse"
        default:
          $ref: "#/components/responses/APIError"
  /auth/passkeys:
    get:
      tags: [Auth]
      summary: List current user passkeys
      responses:
        "200":
          description: User passkeys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyCredentialsResponse"
        default:
          $ref: "#/components/responses/APIError"
  /auth/passkeys/registration/options:
    post:
      tags: [Auth]
      summary: Start passkey registration
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyRegistrationOptionsRequest"
      responses:
        "200":
          description: WebAuthn registration options
          content:
            application/json:
              schema:
                type: object
        default:
          $ref: "#/components/responses/APIError"
  /auth/passkeys/registration/verify:
    post:
      tags: [Auth]
      summary: Verify passkey registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Created passkey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyCredential"
        default:
          $ref: "#/components/responses/APIError"
  /auth/passkeys/{id}:
    patch:
      tags: [Auth]
      summary: Rename a passkey
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyRenameRequest"
      responses:
        "200":
          description: Renamed passkey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyCredential"
        default:
          $ref: "#/components/responses/APIError"
    delete:
      tags: [Auth]
      summary: Delete a passkey
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Deleted passkey
        default:
          $ref: "#/components/responses/APIError"
  /auth/sessions/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    delete:
      tags: [Auth]
      summary: Revoke a user session
      responses:
        "204":
          description: Session revoked
        default:
          $ref: "#/components/responses/APIError"
  /categories:
    get:
      tags: [Categories]
      summary: List categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
        default:
          $ref: "#/components/responses/APIError"
    post:
      tags: [Categories]
      summary: Create category
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        default:
          $ref: "#/components/responses/APIError"
  /financial-goals:
    get:
      tags: [Goals]
      summary: List financial goals
      responses:
        "200":
          description: Financial goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FinancialGoal"
        default:
          $ref: "#/components/responses/APIError"
    post:
      tags: [Goals]
      summary: Create financial goal
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFinancialGoalRequest"
      responses:
        "201":
          description: Financial goal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialGoal"
        default:
          $ref: "#/components/responses/APIError"
  /financial-goals/{id}:
    patch:
      tags: [Goals]
      summary: Update financial goal
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFinancialGoalRequest"
      responses:
        "200":
          description: Financial goal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialGoal"
        default:
          $ref: "#/components/responses/APIError"
  /category-limits:
    get:
      tags: [Goals]
      summary: List monthly category limits
      responses:
        "200":
          description: Category limits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryLimit"
        default:
          $ref: "#/components/responses/APIError"
    post:
      tags: [Goals]
      summary: Create monthly category limit
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryLimitRequest"
      responses:
        "201":
          description: Category limit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryLimit"
        default:
          $ref: "#/components/responses/APIError"
  /category-limits/{id}:
    patch:
      tags: [Goals]
      summary: Update monthly category limit
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryLimitRequest"
      responses:
        "200":
          description: Category limit updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryLimit"
        default:
          $ref: "#/components/responses/APIError"
  /currency-rates:
    get:
      tags: [Currencies]
      summary: Latest exchange rates for a base currency
      parameters:
        - name: base
          in: query
          schema:
            type: string
            minLength: 3
            maxLength: 3
            default: RUB
      responses:
        "200":
          description: Exchange rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrencyRateTable"
        default:
          $ref: "#/components/responses/APIError"
  /accounts:
    get:
      tags: [Accounts]
      summary: List accounts
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
        default:
          $ref: "#/components/responses/APIError"
    post:
      tags: [Accounts]
      summary: Create account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Created account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        default:
          $ref: "#/components/responses/APIError"
  /accounts/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Accounts]
      summary: Get account
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        default:
          $ref: "#/components/responses/APIError"
    patch:
      tags: [Accounts]
      summary: Update account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        default:
          $ref: "#/components/responses/APIError"
  /accounts/{id}/archive:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Accounts]
      summary: Archive account
      responses:
        "204":
          description: Archived account
        default:
          $ref: "#/components/responses/APIError"
  /accounts/{id}/balance:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Accounts]
      summary: Get account balance
      responses:
        "200":
          description: Account balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountBalance"
        default:
          $ref: "#/components/responses/APIError"
  /transactions:
    get:
      tags: [Transactions]
      summary: List transactions
      parameters:
        - name: account_id
          in: query
          schema:
            type: string
            format: uuid
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            type: array
            items:
              $ref: "#/components/schemas/TransactionType"
          style: form
          explode: true
        - name: categorized
          in: query
          schema:
            type: boolean
            default: false
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: offset
          in: query
          description: Zero-based row offset. Overrides page-based offset when positive.
          schema:
            type: integer
            minimum: 0
            default: 1
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        default:
          $ref: "#/components/responses/APIError"
    post:
      tags: [Transactions]
      summary: Create transaction
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        default:
          $ref: "#/components/responses/APIError"
  /transactions/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Transactions]
      summary: Get transaction
      responses:
        "200":
          description: Transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        default:
          $ref: "#/components/responses/APIError"
  /transactions/{id}/cancel:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Transactions]
      summary: Cancel a confirmed manual transaction
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Cancelled transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        default:
          $ref: "#/components/responses/APIError"
  /transactions/{id}/reverse:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Transactions]
      summary: Reverse a confirmed manual transaction with an adjustment
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Reversed transaction and created adjustment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReverseTransactionResponse"
        default:
          $ref: "#/components/responses/APIError"
  /transactions/{id}/soft-delete:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Transactions]
      summary: Soft-delete a confirmed manual transaction
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Soft-deleted transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        default:
          $ref: "#/components/responses/APIError"
  /transfers:
    get:
      tags: [Transfers]
      summary: List transfer business events
      responses:
        "200":
          description: Transfer audit events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransferEvent"
        default:
          $ref: "#/components/responses/APIError"
    post:
      tags: [Transfers]
      summary: Create transfer
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransferRequest"
      responses:
        "201":
          description: Created transfer pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferResponse"
        default:
          $ref: "#/components/responses/APIError"
  /interest-rules:
    get:
      tags: [Interest Rules]
      summary: List current user interest rules
      responses:
        "200":
          description: Interest rules for accounts owned by the current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InterestRule"
        default:
          $ref: "#/components/responses/APIError"
  /accounts/{id}/interest-rules:
    parameters:
      - $ref: "#/components/parameters/ID"
    get:
      tags: [Interest Rules]
      summary: List account interest rules
      responses:
        "200":
          description: Interest rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InterestRule"
        default:
          $ref: "#/components/responses/APIError"
    post:
      tags: [Interest Rules]
      summary: Create interest rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInterestRuleRequest"
      responses:
        "201":
          description: Created interest rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterestRule"
        default:
          $ref: "#/components/responses/APIError"
  /interest-rules/{id}:
    parameters:
      - $ref: "#/components/parameters/ID"
    patch:
      tags: [Interest Rules]
      summary: Update interest rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInterestRuleRequest"
      responses:
        "200":
          description: Updated interest rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterestRule"
        default:
          $ref: "#/components/responses/APIError"
  /accounts/{id}/accrue-interest:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Interest Rules]
      summary: Accrue interest for one day
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccrueInterestRequest"
      responses:
        "201":
          description: Created interest accrual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccrueInterestResponse"
        "200":
          description: Accrual skipped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccrueInterestSkippedResponse"
        default:
          $ref: "#/components/responses/APIError"
  /accounts/{id}/recalculate-interest:
    parameters:
      - $ref: "#/components/parameters/ID"
    post:
      tags: [Interest Rules]
      summary: Replace and recalculate daily interest accruals
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecalculateInterestRequest"
      responses:
        "200":
          description: Recalculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecalculateInterestResponse"
        default:
          $ref: "#/components/responses/APIError"
  /dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        default:
          $ref: "#/components/responses/APIError"
  /dashboard/net-worth:
    get:
      tags: [Dashboard]
      summary: Net worth snapshot
      responses:
        "200":
          description: Net worth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardNetWorth"
        default:
          $ref: "#/components/responses/APIError"
  /dashboard/cashflow:
    get:
      tags: [Dashboard]
      summary: Monthly cashflow buckets
      parameters:
        - $ref: "#/components/parameters/Months"
      responses:
        "200":
          description: Cashflow buckets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardCashflow"
        default:
          $ref: "#/components/responses/APIError"
  /dashboard/interest-income:
    get:
      tags: [Dashboard]
      summary: Monthly interest income buckets
      parameters:
        - $ref: "#/components/parameters/Months"
      responses:
        "200":
          description: Interest income buckets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardInterestIncome"
        default:
          $ref: "#/components/responses/APIError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Months:
      name: months
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 60
        default: 6
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Unique key for safely retrying this mutation.
      schema:
        type: string
        minLength: 1
        maxLength: 255
  responses:
    APIError:
      description: API error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: validation_error
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    AuthUser:
      type: object
      required: [id, email, primary_currency]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        primary_currency:
          type: string
          minLength: 3
          maxLength: 3
    AuthSetupRequest:
      type: object
      required: [email, password, primary_currency]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        primary_currency:
          type: string
          minLength: 3
          maxLength: 3
    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    AuthResponse:
      type: object
      required: [user, access_token, access_expires_at]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        access_token:
          type: string
        access_expires_at:
          type: string
          format: date-time
    AuthStatusResponse:
      type: object
      required: [setup_required, version]
      properties:
        setup_required:
          type: boolean
        version:
          type: string
    ServiceStatus:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
        version:
          type: string
    ReadyStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          minLength: 1
        new_password:
          type: string
          minLength: 1
    AuthSessionInfo:
      type: object
      required: [id, expires_at, created_at, active, current]
      properties:
        id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        active:
          type: boolean
        current:
          type: boolean
    AuthSessionsResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/AuthSessionInfo"
    PasskeyCredential:
      type: object
      required: [id, name, backup_eligible, backup_state, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        backup_eligible:
          type: boolean
        backup_state:
          type: boolean
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    PasskeyCredentialsResponse:
      type: object
      required: [passkeys]
      properties:
        passkeys:
          type: array
          items:
            $ref: "#/components/schemas/PasskeyCredential"
    PasskeyRegistrationOptionsRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 1
    PasskeyRenameRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
    Profile:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
    UpdateProfileRequest:
      type: object
      required: [primary_currency]
      properties:
        primary_currency:
          type: string
          minLength: 3
          maxLength: 3
    AccountType:
      type: string
      enum: [cash, card, savings, term_deposit, broker, other]
    TransactionType:
      type: string
      enum:
        [
          initial_balance,
          income,
          expense,
          transfer_in,
          transfer_out,
          interest_income,
          adjustment,
        ]
    TransactionStatus:
      type: string
      enum: [pending, confirmed, cancelled, reversed, soft_deleted]
    TransactionSource:
      type: string
      enum:
        [
          manual,
          csv_import,
          transfer,
          deposit_interest,
          savings_allocation,
          subscription,
          reconciliation_adjustment,
          automation_rule,
          llm_draft,
          system,
        ]
    AccrualFrequency:
      type: string
      enum: [daily, monthly, end_of_term]
    CapitalizationFrequency:
      type: string
      enum: [none, daily, monthly, end_of_term]
    DayCountConvention:
      type: string
      enum: [actual_365, actual_366, actual_actual]
    Amount:
      type: object
      required: [currency, amount]
      properties:
        currency:
          type: string
          minLength: 3
          maxLength: 3
        amount:
          type: string
          pattern: "^-?\\d+(\\.\\d{1,18})?$"
    Account:
      type: object
      required:
        [id, name, type, currency, is_active, opened_at, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        legacy_id:
          type: string
          nullable: true
        name:
          type: string
        bank:
          type: string
        type:
          $ref: "#/components/schemas/AccountType"
        currency:
          type: string
        is_active:
          type: boolean
        opened_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateAccountRequest:
      type: object
      required: [name, bank, type, currency, opened_at]
      properties:
        name:
          type: string
        bank:
          type: string
        type:
          $ref: "#/components/schemas/AccountType"
        currency:
          type: string
        opened_at:
          type: string
          format: date
    UpdateAccountRequest:
      type: object
      properties:
        name:
          type: string
        bank:
          type: string
        type:
          $ref: "#/components/schemas/AccountType"
        currency:
          type: string
        opened_at:
          type: string
          format: date
        is_active:
          type: boolean
    AccountBalance:
      type: object
      required: [account_id, balance, transaction_count]
      properties:
        account_id:
          type: string
          format: uuid
        balance:
          type: string
          pattern: "^-?\\d+(\\.\\d{1,18})?$"
        transaction_count:
          type: integer
    Category:
      type: object
      required: [id, slug, name, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateCategoryRequest:
      type: object
