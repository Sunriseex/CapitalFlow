        exchange_rate_scale:
          type: integer
        exchange_rate_provider:
          type: string
        exchange_rate_date:
          type: string
          format: date-time
        fee_amount:
          type: string
        fee_currency:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
