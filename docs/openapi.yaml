        - from_transaction_id
        - to_transaction_id
        - from_amount
        - to_amount
        - from_currency
        - to_currency
        - exchange_rate
        - exchange_rate_scale
        - exchange_rate_provider
        - exchange_rate_date
        - fee_amount
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        from_account_id:
          type: string
          format: uuid
        to_account_id:
