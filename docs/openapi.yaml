        account_id:
          type: string
          format: uuid
        related_account_id:
          type: string
          format: uuid
          nullable: true
        type:
          $ref: "#/components/schemas/TransactionType"
        amount:
          type: string
          pattern: "^-?\\d+(\\.\\d{1,18})?$"
        category_id:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
        occurred_at:
          type: string
          format: date
    CreateTransferRequest:
      type: object
      required: [from_account_id, to_account_id, amount, description]
      properties:
        from_account_id:
          type: string
          format: uuid
        to_account_id:
          type: string
          format: uuid
        amount:
          type: string
          pattern: "^-?\\d+(\\.\\d{1,18})?$"
        fee_amount:
          type: string
          pattern: "^\\d+(\\.\\d{1,18})?$"
          default: "0"
        fee_currency:
          type: string
        description:
          type: string
    TransferResponse:
      type: object
      required: [out, in, exchange_rate]
      properties:
        out:
          $ref: "#/components/schemas/Transaction"
        in:
          $ref: "#/components/schemas/Transaction"
        fee:
          $ref: "#/components/schemas/Transaction"
        exchange_rate:
          type: string
          description: Rate used to convert out amount into in amount.
