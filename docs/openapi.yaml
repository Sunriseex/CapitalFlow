          type: string
          pattern: "^\\d+(\\.\\d{1,18})?$"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        target_date:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [active, completed, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateFinancialGoalRequest:
      type: object
      required: [account_id, name, target_amount]
