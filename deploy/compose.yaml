name: capitalflow

services:
  postgres:
    image: postgres:17-alpine
    container_name: capitalflow-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?postgres db required}
      POSTGRES_USER: ${POSTGRES_USER:?postgres user required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  migrate:
    build:
      context: ..
      dockerfile: Dockerfile.api
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: ${CAPITALFLOW_API_IMAGE:-capitalflow-api:local}
    environment:
      DATABASE_URL: ${DATABASE_URL:?database url required}
    entrypoint: ["/usr/local/bin/goose"]
    command: ["-dir", "/app/migrations", "postgres", "${DATABASE_URL:?database url required}", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    profiles:
      - tools

  job-runner:
    build:
      context: ..
      dockerfile: Dockerfile.api
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: ${CAPITALFLOW_API_IMAGE:-capitalflow-api:local}
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?database url required}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:?public origin required}
      JWT_SECRET: ${JWT_SECRET:?jwt secret required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CAPITALFLOW_BACKUP_TIMEOUT: ${CAPITALFLOW_BACKUP_TIMEOUT:-30m}
      CAPITALFLOW_BACKUP_RETENTION_COUNT: ${CAPITALFLOW_BACKUP_RETENTION_COUNT:-14}
      TZ: ${TZ:-Europe/Moscow}
    entrypoint: ["/usr/local/bin/capitalflow"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - ${CAPITALFLOW_BACKUP_HOST_DIR:-./backups}:/backups
    profiles:
      - tools

  interest-scheduler:
    image: ${CAPITALFLOW_API_IMAGE:-capitalflow-api:local}
    container_name: capitalflow-interest-scheduler
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?database url required}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:?public origin required}
      JWT_SECRET: ${JWT_SECRET:?jwt secret required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CAPITALFLOW_INTEREST_HEARTBEAT_FILE: /operations/capitalflow-interest-scheduler.heartbeat
      CAPITALFLOW_INTEREST_STARTED_FILE: /operations/capitalflow-interest-scheduler.started
      CAPITALFLOW_INTEREST_SUCCESS_FILE: /operations/capitalflow-interest-scheduler.last-success
      CAPITALFLOW_INTEREST_STATUS_FILE: /operations/capitalflow-interest-scheduler.status
      CAPITALFLOW_INTEREST_JOBS_ENABLED: ${CAPITALFLOW_INTEREST_JOBS_ENABLED:-true}
      CAPITALFLOW_INTEREST_JOBS_TIME: ${CAPITALFLOW_INTEREST_JOBS_TIME:-03:15}
      CAPITALFLOW_INTEREST_JOB_TIMEOUT: ${CAPITALFLOW_INTEREST_JOB_TIMEOUT:-30m}
      CAPITALFLOW_SCHEDULER_HEARTBEAT_MAX_AGE: ${CAPITALFLOW_SCHEDULER_HEARTBEAT_MAX_AGE:-300}
      CAPITALFLOW_INTEREST_SUCCESS_MAX_AGE: ${CAPITALFLOW_INTEREST_SUCCESS_MAX_AGE:-108000}
      TZ: ${TZ:-Europe/Moscow}
    entrypoint: ["/usr/local/bin/capitalflow-interest-scheduler"]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/capitalflow-scheduler-healthcheck /operations/capitalflow-interest-scheduler.heartbeat /operations/capitalflow-interest-scheduler.last-success /operations/capitalflow-interest-scheduler.started $${CAPITALFLOW_SCHEDULER_HEARTBEAT_MAX_AGE} $${CAPITALFLOW_INTEREST_SUCCESS_MAX_AGE}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - ${CAPITALFLOW_OPERATIONS_HOST_DIR:-./operations}:/operations

  backup-scheduler:
    image: ${CAPITALFLOW_API_IMAGE:-capitalflow-api:local}
    container_name: capitalflow-backup-scheduler
    user: ${CAPITALFLOW_BACKUP_UID:-1000}:${CAPITALFLOW_BACKUP_GID:-1000}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?database url required}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:?public origin required}
      JWT_SECRET: ${JWT_SECRET:?jwt secret required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CAPITALFLOW_BACKUP_HEARTBEAT_FILE: /operations/capitalflow-backup-scheduler.heartbeat
      CAPITALFLOW_BACKUP_STARTED_FILE: /operations/capitalflow-backup-scheduler.started
      CAPITALFLOW_BACKUP_SUCCESS_FILE: /operations/capitalflow-backup-scheduler.last-success
      CAPITALFLOW_BACKUP_STATUS_FILE: /operations/capitalflow-backup-scheduler.status
      CAPITALFLOW_BACKUPS_ENABLED: ${CAPITALFLOW_BACKUPS_ENABLED:-true}
      CAPITALFLOW_BACKUP_TIME: ${CAPITALFLOW_BACKUP_TIME:-02:30}
      CAPITALFLOW_BACKUP_TIMEOUT: ${CAPITALFLOW_BACKUP_TIMEOUT:-30m}
      CAPITALFLOW_BACKUP_RETENTION_COUNT: ${CAPITALFLOW_BACKUP_RETENTION_COUNT:-14}
      CAPITALFLOW_BACKUP_REPLICATION_COMMAND: ${CAPITALFLOW_BACKUP_REPLICATION_COMMAND:-}
      CAPITALFLOW_BACKUP_REPLICATION_REQUIRED: ${CAPITALFLOW_BACKUP_REPLICATION_REQUIRED:-true}
      CAPITALFLOW_RESTORE_DRILL_ENABLED: ${CAPITALFLOW_RESTORE_DRILL_ENABLED:-true}
      CAPITALFLOW_RESTORE_DRILL_INTERVAL_DAYS: ${CAPITALFLOW_RESTORE_DRILL_INTERVAL_DAYS:-7}
      CAPITALFLOW_RESTORE_DRILL_TIMEOUT: ${CAPITALFLOW_RESTORE_DRILL_TIMEOUT:-30m}
      CAPITALFLOW_SCHEDULER_HEARTBEAT_MAX_AGE: ${CAPITALFLOW_SCHEDULER_HEARTBEAT_MAX_AGE:-300}
      CAPITALFLOW_BACKUP_SUCCESS_MAX_AGE: ${CAPITALFLOW_BACKUP_SUCCESS_MAX_AGE:-108000}
      CAPITALFLOW_DISK_MAX_USED_PERCENT: ${CAPITALFLOW_DISK_MAX_USED_PERCENT:-90}
      CAPITALFLOW_DISK_MIN_FREE_MB: ${CAPITALFLOW_DISK_MIN_FREE_MB:-1024}
      TZ: ${TZ:-Europe/Moscow}
    entrypoint: ["/usr/local/bin/capitalflow-backup-scheduler"]
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/capitalflow-scheduler-healthcheck /operations/capitalflow-backup-scheduler.heartbeat /operations/capitalflow-backup-scheduler.last-success /operations/capitalflow-backup-scheduler.started $${CAPITALFLOW_SCHEDULER_HEARTBEAT_MAX_AGE} $${CAPITALFLOW_BACKUP_SUCCESS_MAX_AGE}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ${CAPITALFLOW_BACKUP_HOST_DIR:-./backups}:/backups
      - ${CAPITALFLOW_OPERATIONS_HOST_DIR:-./operations}:/operations
      - ${CAPITALFLOW_BACKUP_REPLICATION_HOST_DIR:-./replication}:/replication:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: ${CAPITALFLOW_API_IMAGE:-capitalflow-api:local}
    container_name: capitalflow-api
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?database url required}
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:?public origin required}
      CORS_ALLOWED_ORIGINS: ${PUBLIC_ORIGIN:?public origin required}
      JWT_SECRET: ${JWT_SECRET:?jwt secret required}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: Strict
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-127.0.0.1/32,172.16.0.0/12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CAPITALFLOW_OPERATIONS_DIR: /operations
    ports:
      - "127.0.0.1:${CAPITALFLOW_API_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - ${CAPITALFLOW_OPERATIONS_HOST_DIR:-./operations}:/operations:ro

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    image: ${CAPITALFLOW_WEB_IMAGE:-capitalflow-web:local}
    container_name: capitalflow-web
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:${CAPITALFLOW_WEB_PORT:-18081}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=${CAPITALFLOW_PROXY_NETWORK:-proxy}
      - traefik.http.routers.capitalflow.rule=Host(`${CAPITALFLOW_HOST:-capitalflow.home.arpa}`)
      - traefik.http.routers.capitalflow.entrypoints=websecure
      - traefik.http.routers.capitalflow.tls=true
      - traefik.http.services.capitalflow.loadbalancer.server.port=8080

volumes:
  postgres-data:

networks:
  backend:
  proxy:
    external: true
    name: ${CAPITALFLOW_PROXY_NETWORK:-proxy}
