name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -buildvcs=false
  DATABASE_URL: postgres://finance_tracker:finance_tracker@localhost:5432/finance_tracker?sslmode=disable

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download


      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: go build ./cmd/...

  race:
    name: Race tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run race tests
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --config=.golangci.yaml --timeout=5m

  web:
    name: WebUI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  openapi:
    name: OpenAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate OpenAPI spec
        run: npx --yes @redocly/cli lint docs/openapi.yaml

  migrations:
    name: PostgreSQL migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: finance_tracker
          POSTGRES_USER: finance_tracker
          POSTGRES_PASSWORD: finance_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance_tracker -d finance_tracker"
          --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run migrations up
        run: |
          go run github.com/pressly/goose/v3/cmd/goose@v3.27.1 \
            -dir migrations \
            postgres "$DATABASE_URL" \
            up

      - name: Check migration status
        run: |
          go run github.com/pressly/goose/v3/cmd/goose@v3.27.1 \
            -dir migrations \
            postgres "$DATABASE_URL" \
            status

  validate-production-images:
    name: Validate production images
    runs-on: ubuntu-latest
    needs:
      - test
      - race
      - lint
      - web
      - openapi
      - migrations
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: capitalflow-api:pr-${{ github.event.pull_request.head.sha }}
          cache-from: type=gha,scope=api

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: false
          tags: capitalflow-web:pr-${{ github.event.pull_request.head.sha }}
          cache-from: type=gha,scope=web

  release-guard:
    name: Release tag guard
    runs-on: ubuntu-latest
    needs:
      - test
      - race
      - lint
      - web
      - openapi
      - migrations
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require tag commit on master
        shell: bash
        run: |
          git fetch origin master --no-tags
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/master; then
            echo "Release tag ${GITHUB_REF_NAME} points to ${GITHUB_SHA}, which is not on origin/master." >&2
            exit 1
          fi

  build-images:
    name: Build production images
    runs-on: ubuntu-latest
    needs:
      - release-guard
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image names
        id: names
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          api="ghcr.io/${owner}/capitalflow-api"
          web="ghcr.io/${owner}/capitalflow-web"
          {
            echo "api_tags<<EOF"
            echo "${api}:${GITHUB_REF_NAME}"
            echo "${api}:sha-${GITHUB_SHA}"
            echo "EOF"
            echo "web_tags<<EOF"
            echo "${web}:${GITHUB_REF_NAME}"
            echo "${web}:sha-${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ steps.names.outputs.api_tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ steps.names.outputs.web_tags }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-images
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${TAG_NAME}" --generate-notes

  notify-release:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs:
      - release-guard
      - build-images
      - create-release
    if: always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    env:
      TELEGRAM_ENABLED: ${{ secrets.TELEGRAM_TOKEN != '' && secrets.TELEGRAM_TO != '' }}

    steps:
      - name: Build notification
        id: message
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          api_image="ghcr.io/${owner}/capitalflow-api:${GITHUB_REF_NAME}"
          web_image="ghcr.io/${owner}/capitalflow-web:${GITHUB_REF_NAME}"
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          status="success"
          title="✅ CapitalFlow release ${GITHUB_REF_NAME} published"
          if [ "${{ needs.release-guard.result }}" != "success" ]; then
            status="failed"
            title="❌ CapitalFlow release ${GITHUB_REF_NAME} rejected: tag is not on master"
          elif [ "${{ needs.build-images.result }}" != "success" ] || [ "${{ needs.create-release.result }}" != "success" ]; then
            status="failed"
            title="❌ CapitalFlow release ${GITHUB_REF_NAME} failed"
          fi

          {
            echo "status=${status}"
            echo "text<<EOF"
            echo "${title}"
            echo ""
            echo "Repository: ${GITHUB_REPOSITORY}"
            echo "Actor: ${GITHUB_ACTOR}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Release: ${release_url}"
            echo "Actions: ${run_url}"
            echo ""
            echo "Images:"
            echo "${api_image}"
            echo "${web_image}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        if: env.TELEGRAM_ENABLED == 'true'
        uses: appleboy/telegram-action@v1.0.1
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_TO }}
          message: ${{ steps.message.outputs.text }}

      - name: Skip Telegram notification
        if: env.TELEGRAM_ENABLED != 'true'
        run: echo "TELEGRAM_TOKEN or TELEGRAM_TO is not configured; skipping Telegram notification."
