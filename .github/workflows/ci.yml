name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -buildvcs=false
  DATABASE_URL: postgres://finance_tracker:finance_tracker@localhost:5432/finance_tracker?sslmode=disable

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run tests
        run: go test ./...

      - name: Run scheduler tests
        if: runner.os == 'Linux'
        run: |
          sh scripts/interest-schedule_test.sh
          sh scripts/backup-schedule_test.sh
          sh scripts/backup-retention_test.sh
          sh scripts/backup-scheduler_test.sh
          sh scripts/interest-scheduler_test.sh
          sh scripts/scheduler-healthcheck_test.sh
          sh scripts/restore-drill_test.sh
          sh scripts/disk-guard_test.sh
          sh scripts/pre-migration-backup_test.sh

      - name: Build binaries
        run: go build ./cmd/...

  race:
    name: Race tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run race tests
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --config=.golangci.yaml --timeout=5m

  go-fix:
    name: Go fix (check modernizations)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run go fix check
        run: make fix-check

  web:
    name: WebUI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  openapi:
    name: OpenAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate OpenAPI spec
        run: npx --yes @redocly/cli lint docs/openapi.yaml

  migrations:
    name: PostgreSQL migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: finance_tracker
          POSTGRES_USER: finance_tracker
          POSTGRES_PASSWORD: finance_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance_tracker -d finance_tracker"
          --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run migrations up
        run: |
          go run github.com/pressly/goose/v3/cmd/goose@v3.27.1 \
            -dir migrations \
            postgres "$DATABASE_URL" \
            up

      - name: Check migration status
        run: |
          go run github.com/pressly/goose/v3/cmd/goose@v3.27.1 \
            -dir migrations \
            postgres "$DATABASE_URL" \
            status

      - name: Run PostgreSQL integration tests
        env:
          TEST_DATABASE_URL: ${{ env.DATABASE_URL }}
        run: go test ./internal/postgres -count=1 -v

      - name: Verify backup and restore
        env:
          TEST_DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl --fail --silent --show-error \
            --output /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          printf 'deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt %s-pgdg main\n' \
            "$VERSION_CODENAME" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install --yes postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version
          PATH="/usr/lib/postgresql/17/bin:$PATH" \
            go test ./internal/backup -run TestCreateAndRestoreIntoEmptyDatabase -v

  real-e2e:
    name: Real financial flow E2E
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgres://capitalflow:capitalflow@localhost:5432/capitalflow_e2e?sslmode=disable

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: capitalflow_e2e
          POSTGRES_USER: capitalflow
          POSTGRES_PASSWORD: capitalflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U capitalflow -d capitalflow_e2e"
          --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install WebUI dependencies
        working-directory: web
        run: npm ci

      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run migrations
        run: |
          go run github.com/pressly/goose/v3/cmd/goose@v3.27.1 \
            -dir migrations \
            postgres "$TEST_DATABASE_URL" \
            up

      - name: Run real E2E
        working-directory: web
        run: npm run test:e2e:real

  validate-production-images:
    name: Validate production images
    runs-on: ubuntu-latest
    needs:
      - test
      - race
      - lint
      - web
      - openapi
      - migrations
      - real-e2e
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          build-args: |
            APP_VERSION=pr-${{ github.event.pull_request.head.sha }}
          tags: capitalflow-api:pr-${{ github.event.pull_request.head.sha }}
          cache-from: type=gha,scope=api

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: false
          build-args: |
            APP_VERSION=pr-${{ github.event.pull_request.head.sha }}
          tags: capitalflow-web:pr-${{ github.event.pull_request.head.sha }}
          cache-from: type=gha,scope=web

  release-guard:
    name: Release tag guard
    runs-on: ubuntu-latest
    needs:
      - test
      - race
      - lint
      - web
      - openapi
      - migrations
      - real-e2e
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require tag commit on master
        shell: bash
        run: |
          git fetch origin master --no-tags
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/master; then
            echo "Release tag ${GITHUB_REF_NAME} points to ${GITHUB_SHA}, which is not on origin/master." >&2
            exit 1
          fi

  build-images:
    name: Build production images
    runs-on: ubuntu-latest
    needs:
      - release-guard
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image names
        id: names
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          api="ghcr.io/${owner}/capitalflow-api"
          web="ghcr.io/${owner}/capitalflow-web"
          {
            echo "api_image=${api}"
            echo "web_image=${web}"
            echo "api_tags<<EOF"
            echo "${api}:${GITHUB_REF_NAME}"
            echo "${api}:sha-${GITHUB_SHA}"
            echo "EOF"
            echo "web_tags<<EOF"
            echo "${web}:${GITHUB_REF_NAME}"
            echo "${web}:sha-${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          tags: ${{ steps.names.outputs.api_tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Verify API image version
        shell: bash
        run: |
          image="${{ steps.names.outputs.api_image }}:${GITHUB_REF_NAME}"

          docker pull "$image"

          env_version="$(docker run --rm --entrypoint /bin/sh "$image" -c 'printf "%s" "$APP_VERSION"')"
          label_version="$(docker inspect "$image" --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')"

          if [ "$env_version" != "$GITHUB_REF_NAME" ]; then
            echo "Expected APP_VERSION=${GITHUB_REF_NAME}, got ${env_version}" >&2
            exit 1
          fi

          if [ "$label_version" != "$GITHUB_REF_NAME" ]; then
            echo "Expected image label version=${GITHUB_REF_NAME}, got ${label_version}" >&2
            exit 1
          fi

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          tags: ${{ steps.names.outputs.web_tags }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Verify Web image version
        shell: bash
        run: |
          image="${{ steps.names.outputs.web_image }}:${GITHUB_REF_NAME}"
          docker pull "$image"
          label_version="$(docker inspect "$image" --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')"
          if [ "$label_version" != "$GITHUB_REF_NAME" ]; then
            echo "Expected Web image label version=${GITHUB_REF_NAME}, got ${label_version}" >&2
            exit 1
          fi

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-images
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${TAG_NAME}" --generate-notes

  notify-release:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs:
      - release-guard
      - build-images
      - create-release
    if: always() && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    env:
      TELEGRAM_ENABLED: ${{ secrets.TELEGRAM_TOKEN != '' && secrets.TELEGRAM_TO != '' }}

    steps:
      - name: Build notification
        id: message
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          api_image="ghcr.io/${owner}/capitalflow-api:${GITHUB_REF_NAME}"
          web_image="ghcr.io/${owner}/capitalflow-web:${GITHUB_REF_NAME}"
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          status="success"
          title="✅ CapitalFlow release ${GITHUB_REF_NAME} published"
          if [ "${{ needs.release-guard.result }}" != "success" ]; then
            status="failed"
            title="❌ CapitalFlow release ${GITHUB_REF_NAME} rejected: tag is not on master"
          elif [ "${{ needs.build-images.result }}" != "success" ] || [ "${{ needs.create-release.result }}" != "success" ]; then
            status="failed"
            title="❌ CapitalFlow release ${GITHUB_REF_NAME} failed"
          fi

          {
            echo "status=${status}"
            echo "text<<EOF"
            echo "${title}"
            echo ""
            echo "Repository: ${GITHUB_REPOSITORY}"
            echo "Actor: ${GITHUB_ACTOR}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Release: ${release_url}"
            echo "Actions: ${run_url}"
            echo ""
            echo "Images:"
            echo "${api_image}"
            echo "${web_image}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        if: env.TELEGRAM_ENABLED == 'true'
        uses: appleboy/telegram-action@v1.0.1
        with:
          token: ${{ secrets.TELEGRAM_TOKEN }}
          to: ${{ secrets.TELEGRAM_TO }}
          message: ${{ steps.message.outputs.text }}

      - name: Skip Telegram notification
        if: env.TELEGRAM_ENABLED != 'true'
        run: echo "TELEGRAM_TOKEN or TELEGRAM_TO is not configured; skipping Telegram notification."
