name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -buildvcs=false
  DATABASE_URL: postgres://finance_tracker:finance_tracker@localhost:5432/finance_tracker?sslmode=disable

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download


      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: go build ./cmd/...

  race:
    name: Race tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run race tests
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --config=.golangci.yaml --timeout=5m

  web:
    name: WebUI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  openapi:
    name: OpenAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate OpenAPI spec
        run: npx --yes @redocly/cli lint docs/openapi.yaml

  migrations:
    name: PostgreSQL migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: finance_tracker
          POSTGRES_USER: finance_tracker
          POSTGRES_PASSWORD: finance_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finance_tracker -d finance_tracker"
          --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run migrations up
        run: |
          go run github.com/pressly/goose/v3/cmd/goose@v3.27.1 \
            -dir migrations \
            postgres "$DATABASE_URL" \
            up

      - name: Check migration status
        run: |
          go run github.com/pressly/goose/v3/cmd/goose@v3.27.1 \
            -dir migrations \
            postgres "$DATABASE_URL" \
            status

  validate-production-images:
    name: Validate production images
    runs-on: ubuntu-latest
    needs:
      - test
      - race
      - lint
      - web
      - openapi
      - migrations
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: capitalflow-api:pr-${{ github.event.pull_request.head.sha }}
          cache-from: type=gha,scope=api

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: false
          tags: capitalflow-web:pr-${{ github.event.pull_request.head.sha }}
          cache-from: type=gha,scope=web

  build-images:
    name: Build production images
    runs-on: ubuntu-latest
    needs:
      - test
      - race
      - lint
      - web
      - openapi
      - migrations
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    permissions:
      contents: read
      packages: write
    outputs:
      api_image: ${{ steps.names.outputs.api_image }}
      web_image: ${{ steps.names.outputs.web_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image names
        id: names
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "api_image=ghcr.io/${owner}/capitalflow-api:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${owner}/capitalflow-web:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ steps.names.outputs.api_image }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: ${{ steps.names.outputs.web_image }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy-vm:
    name: Deploy VM
    runs-on: ubuntu-latest
    needs:
      - build-images
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check deploy secrets
        shell: bash
        env:
          VM_SSH_HOST: ${{ secrets.VM_SSH_HOST }}
          VM_SSH_USER: ${{ secrets.VM_SSH_USER }}
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          VM_SSH_KNOWN_HOSTS: ${{ secrets.VM_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$VM_SSH_HOST"
          test -n "$VM_SSH_USER"
          test -n "$VM_SSH_PRIVATE_KEY"
          test -n "$VM_SSH_KNOWN_HOSTS"

      - name: Configure SSH
        shell: bash
        env:
          VM_SSH_HOST: ${{ secrets.VM_SSH_HOST }}
          VM_SSH_USER: ${{ secrets.VM_SSH_USER }}
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          VM_SSH_KNOWN_HOSTS: ${{ secrets.VM_SSH_KNOWN_HOSTS }}
          VM_SSH_PORT: ${{ secrets.VM_SSH_PORT }}
        run: |
          port="${VM_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VM_SSH_PRIVATE_KEY" > ~/.ssh/capitalflow_vm
          chmod 600 ~/.ssh/capitalflow_vm
          printf '%s\n' "$VM_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          {
            echo "Host capitalflow-vm"
            echo "  HostName $VM_SSH_HOST"
            echo "  User $VM_SSH_USER"
            echo "  Port $port"
            echo "  IdentityFile ~/.ssh/capitalflow_vm"
            echo "  IdentitiesOnly yes"
            echo "  StrictHostKeyChecking yes"
          } >> ~/.ssh/config

      - name: Login VM to GHCR
        shell: bash
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh capitalflow-vm \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Deploy images to VM
        shell: bash
        env:
          VM_HOST: capitalflow-vm
          DEPLOY_MODE: images
          DEPLOY_REF: ${{ github.sha }}
          REMOTE_DIR: ${{ vars.VM_REMOTE_DIR }}
          PUBLIC_ORIGIN: ${{ vars.PUBLIC_ORIGIN }}
          CAPITALFLOW_PROXY_NETWORK: ${{ vars.CAPITALFLOW_PROXY_NETWORK }}
          CAPITALFLOW_API_IMAGE: ${{ needs.build-images.outputs.api_image }}
          CAPITALFLOW_WEB_IMAGE: ${{ needs.build-images.outputs.web_image }}
        run: |
          REMOTE_DIR="${REMOTE_DIR:-/home/sunriseex/projects/CapitalFlow}" \
          PUBLIC_ORIGIN="${PUBLIC_ORIGIN:-https://capitalflow.home.arpa}" \
          CAPITALFLOW_PROXY_NETWORK="${CAPITALFLOW_PROXY_NETWORK:-proxy}" \
          ./scripts/deploy-vm.sh
